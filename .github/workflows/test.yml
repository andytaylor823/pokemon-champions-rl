name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ts-tests:
    name: TypeScript (sim module)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sim
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sim/package-lock.json

      - run: npm ci
      - run: npm test

  py-tests:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sim/package-lock.json

      # Node deps needed for integration tests (SimClient spawns sim-worker)
      - run: npm ci
        working-directory: sim

      - run: pip install -e ".[dev]"

      # Fast unit tests (default: skips integration and slow markers)
      - name: Unit tests
        run: pytest -v

      # Integration tests (spawn Node worker subprocess)
      - name: Integration tests
        run: pytest -m integration -v
